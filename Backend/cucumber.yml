default:
  requireModule:
    - ts-node/register
  require:
    - features/step-definitions/**/*.ts
  paths:
    - features/**/*.feature
  format:
    - progress-bar

critical:
  requireModule:
    - ts-node/register
  require:
    - features/step-definitions/**/*.ts
  paths:
    - features/**/*.feature
  format:
    - progress-bar
  tags: "@critical"

